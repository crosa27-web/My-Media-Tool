<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Media Manager</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --sidebar-color: #1e293b;
            --accent-color: #ff0000;
            --text-color: #f8fafc;
            --secondary-text: #94a3b8;
            --item-hover: #334155;
            --card-bg: rgba(255, 255, 255, 0.05);
            --player-bg: #000000;
            --heart-color: #ff4757;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        #sidebar {
            width: 380px;
            height: 100vh;
            background-color: var(--sidebar-color);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        #display-area { 
            flex: 1; 
            background: var(--player-bg);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        #auth-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }

        .tabs {
            display: flex;
            background: rgba(0,0,0,0.2);
            padding: 4px;
            border-radius: 10px;
            gap: 2px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 8px 0;
            cursor: pointer;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--secondary-text);
        }

        .tab.active { background: var(--accent-color); color: white; }

        .search-box { padding: 15px 20px; }
        #search-input {
            width: 100%;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-color);
            outline: none;
        }

        #viewport {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px 20px 20px;
        }

        .item-card {
            display: flex;
            gap: 12px;
            padding: 10px;
            background: var(--card-bg);
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
        }
        .item-card:hover { background: var(--item-hover); }

        .thumb-container {
            width: 120px;
            height: 68px;
            flex-shrink: 0;
            border-radius: 4px;
            overflow: hidden;
        }
        .thumb-container img { width: 100%; height: 100%; object-fit: cover; }

        .item-details { flex: 1; min-width: 0; }
        .item-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-channel { font-size: 11px; color: var(--secondary-text); margin-top: 4px; }

        .fav-btn {
            position: absolute;
            right: 10px;
            bottom: 10px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--secondary-text);
            font-size: 16px;
        }
        .fav-btn.active { color: var(--heart-color); }

        #video-container { width: 100%; height: 100%; }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: var(--sidebar-color);
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            text-align: center;
        }
        .modal-content input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: #000;
            color: #fff;
            border: 1px solid #444;
        }
    </style>
</head>
<body>

<div id="display-area">
    <div id="video-container"><div id="player"></div></div>
</div>

<div id="sidebar">
    <div class="header">
        <div class="top-row">
            <h2 style="margin:0; font-size: 18px;">Media Tool</h2>
            <button id="auth-btn" onclick="handleAuthClick()">Connect</button>
        </div>
        <div class="tabs">
            <div id="tab-playlists" class="tab active" onclick="setCategory('playlists')">Playlists</div>
            <div id="tab-history" class="tab" onclick="setCategory('history')">History</div>
            <div id="tab-favs" class="tab" onclick="setCategory('favs')">Favorites</div>
        </div>
    </div>
    
    <div class="search-box">
        <input type="text" id="search-input" placeholder="Search in category..." oninput="filterItems()">
    </div>
    
    <div id="viewport"></div>
</div>

<div id="modal-settings" class="modal-overlay">
    <div class="modal-content">
        <h3>API Configuration</h3>
        <input type="text" id="input-client-id" placeholder="Client ID">
        <input type="password" id="input-api-key" placeholder="API Key">
        <button onclick="saveSettings()" style="width:100%; padding:10px; background:var(--accent-color); color:white; border:none; cursor:pointer;">Save & Reload</button>
    </div>
</div>

<script>
    let CLIENT_ID = localStorage.getItem('yt_client_id') || '';
    let API_KEY = localStorage.getItem('yt_api_key') || '';
    let tokenClient, player, currentCategory = 'playlists';
    
    let fullList = []; 
    let historyList = JSON.parse(localStorage.getItem('yt_history') || '[]');
    let favorites = JSON.parse(localStorage.getItem('yt_favorites') || '[]');

    window.onload = function() {
        if (!CLIENT_ID || !API_KEY) document.getElementById('modal-settings').style.display = 'flex';
        else initGapi();
    };

    function initGapi() {
        gapi.load('client', async () => {
            await gapi.client.init({ 
                apiKey: API_KEY, 
                discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/youtube/v3/rest"] 
            });
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID, 
                scope: "https://www.googleapis.com/auth/youtube.readonly", 
                callback: (resp) => {
                    if (resp.access_token) {
                        document.getElementById('auth-btn').innerText = "Connected";
                        fetchPlaylists();
                    }
                }
            });
        });
    }

    async function fetchPlaylists() {
        const res = await gapi.client.youtube.playlists.list({ part: 'snippet,contentDetails', mine: true, maxResults: 50 });
        fullList = res.result.items;
        renderList(fullList);
    }

    function renderList(items) {
        const container = document.getElementById('viewport');
        container.innerHTML = '';
        items.forEach(item => {
            const vid = item.id?.videoId || item.snippet?.resourceId?.videoId || item.id;
            const isFav = favorites.some(f => (f.id?.videoId || f.snippet?.resourceId?.videoId || f.id) === vid);
            
            const card = document.createElement('div');
            card.className = 'item-card';
            card.onclick = () => playItem(vid, item);
            card.innerHTML = `
                <div class="thumb-container">
                    <img src="${item.snippet.thumbnails?.default?.url}">
                </div>
                <div class="item-details">
                    <div class="item-title">${item.snippet.title}</div>
                    <div class="item-channel">${item.snippet.channelTitle || 'YouTube'}</div>
                </div>
                <button class="fav-btn ${isFav ? 'active' : ''}" onclick="event.stopPropagation(); toggleFav('${vid}', ${JSON.stringify(item).replace(/"/g, '&quot;')})">
                    ${isFav ? '❤️' : '🤍'}
                </button>
            `;
            container.appendChild(card);
        });
    }

    function setCategory(cat) {
        currentCategory = cat;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(`tab-${cat}`).classList.add('active');
        
        if (cat === 'playlists') fetchPlaylists();
        else if (cat === 'history') { fullList = [...historyList]; renderList(fullList); }
        else if (cat === 'favs') { fullList = [...favorites]; renderList(fullList); }
    }

    function playItem(id, item) {
        if (player?.loadVideoById) {
            player.loadVideoById(id);
            // Update History logic: Remove duplicate if exists and unshift to top
            const idx = historyList.findIndex(h => (h.id?.videoId || h.snippet?.resourceId?.videoId || h.id) === id);
            if (idx > -1) historyList.splice(idx, 1);
            historyList.unshift(item);
            if (historyList.length > 100) historyList.pop();
            localStorage.setItem('yt_history', JSON.stringify(historyList));
            if (currentCategory === 'history') renderList(historyList);
        }
    }

    function toggleFav(id, item) {
        const idx = favorites.findIndex(f => (f.id?.videoId || f.snippet?.resourceId?.videoId || f.id) === id);
        if (idx > -1) favorites.splice(idx, 1);
        else favorites.unshift(item);
        localStorage.setItem('yt_favorites', JSON.stringify(favorites));
        if (currentCategory === 'favs') renderList(favorites);
        else renderList(fullList);
    }

    function filterItems() {
        const q = document.getElementById('search-input').value.toLowerCase();
        const listToFilter = currentCategory === 'playlists' ? fullList : (currentCategory === 'history' ? historyList : favorites);
        const filtered = listToFilter.filter(i => i.snippet.title.toLowerCase().includes(q));
        renderList(filtered);
    }

    function handleAuthClick() { tokenClient.requestAccessToken(); }

    function saveSettings() {
        localStorage.setItem('yt_client_id', document.getElementById('input-client-id').value.trim());
        localStorage.setItem('yt_api_key', document.getElementById('input-api-key').value.trim());
        location.reload();
    }

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', { height: '100%', width: '100%', playerVars: { 'autoplay': 1 } });
    }
    const tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
    document.getElementsByTagName('script')[0].parentNode.insertBefore(tag, null);
</script>
</body>
</html>
