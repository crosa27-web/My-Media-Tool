<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Media Tool</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --sidebar-color: #ffffff;
            --accent-color: #ff0000;
            --text-color: #1c1e21;
            --secondary-text: #606770;
            --item-hover: #f2f3f5;
            --card-bg: #ffffff;
            --player-bg: #000000;
        }

        .music-mode {
            --bg-color: #0a0a0a;
            --sidebar-color: #121212;
            --accent-color: #1db954;
            --text-color: #ffffff;
            --secondary-text: #b3b3b3;
            --item-hover: #282828;
            --card-bg: #181818;
            --player-bg: #000000;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background 0.3s ease;
        }

        #sidebar {
            width: 400px;
            background-color: var(--sidebar-color);
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(0,0,0,0.1);
            z-index: 10;
            height: 100%;
        }

        #display-area { 
            flex: 1; 
            position: relative; 
            background: var(--player-bg);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            flex-shrink: 0;
        }

        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-group { display: flex; gap: 8px; align-items: center; }

        #auth-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
        }

        .icon-btn {
            font-size: 18px;
            cursor: pointer;
            opacity: 0.6;
            background: none;
            border: none;
            color: var(--text-color);
            padding: 5px;
        }

        .tabs-container {
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
            flex-shrink: 0;
        }
        .tabs-container::-webkit-scrollbar { display: none; }

        .tabs {
            display: flex;
            background: rgba(0,0,0,0.05);
            padding: 4px;
            border-radius: 8px;
            gap: 2px;
            width: max-content;
            min-width: 100%;
        }

        .tab {
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--secondary-text);
        }

        .tab.active { background: var(--accent-color); color: white; }

        .action-bar { padding: 15px; flex-shrink: 0; display: flex; gap: 10px; }

        #search-input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 20px;
            border: 1px solid rgba(0,0,0,0.1);
            background: var(--bg-color);
            color: var(--text-color);
            outline: none;
        }

        .clear-btn {
            background: rgba(255, 0, 0, 0.1);
            color: #ff4444;
            border: 1px solid rgba(255, 0, 0, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: none;
        }

        #content-list {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .item-card {
            display: flex;
            gap: 12px;
            padding: 10px;
            background: var(--card-bg);
            border-radius: 10px;
            cursor: pointer;
            align-items: center;
            position: relative;
            flex-shrink: 0; /* Ensures cards don't squash */
        }
        .item-card:hover { background: var(--item-hover); }

        .item-card img {
            width: 100px;
            height: 56px;
            border-radius: 6px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .item-details { 
            flex-grow: 1; 
            overflow: hidden; 
            padding-right: 35px;
            display: flex;
            flex-direction: column;
        }

        /* Horizontal Scroll Title Logic */
        .title-wrapper {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            position: relative;
        }

        .item-title { 
            display: inline-block;
            font-size: 13px; 
            font-weight: 600; 
            line-height: 1.2;
        }

        /* Animation trigger on card hover/active */
        .item-card:hover .item-title, 
        .item-card:active .item-title {
            animation: scroll-text 5s linear infinite;
            padding-right: 50px; /* Gap for seamless loop */
        }

        @keyframes scroll-text {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .item-meta { 
            font-size: 11px; 
            color: var(--secondary-text); 
            margin-top: 4px; 
            display: flex; 
            align-items: center; 
            gap: 8px;
            white-space: nowrap;
        }
        
        .stats-badge {
            display: flex;
            align-items: center;
            gap: 3px;
            opacity: 0.8;
        }

        .heart-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: #ccc;
            z-index: 5;
        }
        .heart-btn.is-fav { color: #ff4444; }

        #video-container { width: 100%; height: 100%; }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--sidebar-color);
            color: var(--text-color);
            padding: 25px;
            border-radius: 12px;
            width: 90%;
            max-width: 350px;
        }

        @media (max-width: 900px) {
            body { flex-direction: column; }
            #display-area { 
                width: 100%; 
                height: 35vh; 
                flex: none;
                order: -1; 
            }
            #sidebar { width: 100%; flex: 1; height: 65vh; }
        }
    </style>
</head>
<body class="music-mode">

<div id="display-area">
    <div id="video-container">
        <div id="player"></div>
    </div>
</div>

<div id="sidebar">
    <div class="header">
        <div class="top-row">
            <button id="auth-btn" onclick="handleAuthClick()">Connect YT</button>
            <div class="btn-group">
                <button class="icon-btn" onclick="shuffleCurrentList()" title="Shuffle">🔀</button>
                <button class="icon-btn" onclick="showSettings()" title="Settings">⚙️</button>
            </div>
        </div>
        <div class="tabs-container">
            <div class="tabs">
                <div id="tab-music" class="tab active" onclick="setCategory('music')">Music</div>
                <div id="tab-video" class="tab" onclick="setCategory('video')">Video</div>
                <div id="tab-my-playlists" class="tab" onclick="setCategory('my-playlists')">Playlists</div>
                <div id="tab-favs" class="tab" onclick="setCategory('favs')">Favs</div>
                <div id="tab-history" class="tab" onclick="setCategory('history')">History</div>
            </div>
        </div>
    </div>
    <div class="action-bar">
        <input type="text" id="search-input" placeholder="Search music..." onkeypress="handleSearch(event)">
        <button id="clear-history-btn" class="clear-btn" onclick="clearHistory()">Clear History</button>
    </div>
    <div id="content-list"></div>
</div>

<div id="modal-settings" class="modal-overlay">
    <div class="modal-content">
        <h3>API Settings</h3>
        <input type="text" id="input-client-id" placeholder="Client ID" style="width:100%; margin-bottom:10px; padding:8px;">
        <input type="password" id="input-api-key" placeholder="API Key" style="width:100%; margin-bottom:10px; padding:8px;">
        <div style="display:flex; gap:10px;">
            <button onclick="closeModals()" style="flex:1; padding:10px;">Cancel</button>
            <button onclick="saveSettings()" style="flex:1; padding:10px; background:var(--accent-color); color:white; border:none;">Save</button>
        </div>
    </div>
</div>

<script>
    let CLIENT_ID = localStorage.getItem('yt_client_id') || '';
    let API_KEY = localStorage.getItem('yt_api_key') || '';
    let tokenClient, player, currentCategory = 'music';
    let activeList = [];
    let historyList = JSON.parse(localStorage.getItem('yt_history') || '[]');
    let favorites = JSON.parse(localStorage.getItem('yt_favorites') || '[]');

    window.onload = function() {
        if (!CLIENT_ID || !API_KEY) showSettings();
        else initGapi();
    };

    function initGapi() {
        gapi.load('client', async () => {
            try {
                await gapi.client.init({ apiKey: API_KEY, discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/youtube/v3/rest"] });
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID, scope: "https://www.googleapis.com/auth/youtube.readonly", callback: ''
                });
                performSearch('');
            } catch(e) { console.error("GAPI Init Error", e); }
        });
    }

    function showSettings() { document.getElementById('modal-settings').style.display = 'flex'; }
    function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }
    
    function saveSettings() {
        localStorage.setItem('yt_client_id', document.getElementById('input-client-id').value);
        localStorage.setItem('yt_api_key', document.getElementById('input-api-key').value);
        location.reload();
    }

    function handleAuthClick() {
        tokenClient.callback = async (resp) => { if (!resp.error) { document.getElementById('auth-btn').innerText = "Connected"; } };
        tokenClient.requestAccessToken({prompt: gapi.client.getToken() ? '' : 'consent'});
    }

    function setCategory(cat) {
        currentCategory = cat;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(`tab-${cat}`).classList.add('active');
        
        const isMusic = (cat === 'music');
        document.body.className = isMusic ? 'music-mode' : '';
        
        const searchInput = document.getElementById('search-input');
        const clearBtn = document.getElementById('clear-history-btn');

        if (cat === 'music' || cat === 'video') {
            searchInput.style.display = 'block';
            clearBtn.style.display = 'none';
            searchInput.placeholder = isMusic ? "Search music..." : "Search videos...";
            performSearch(searchInput.value);
        } else {
            searchInput.style.display = 'none';
            if (cat === 'history') {
                clearBtn.style.display = 'block';
                renderList(historyList);
            } else {
                clearBtn.style.display = 'none';
                if (cat === 'my-playlists') loadMyPlaylists();
                else if (cat === 'favs') renderList(favorites);
            }
        }
    }

    function formatNumber(num) {
        if (!num) return '0';
        num = parseInt(num);
        if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
        if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
        return num.toString();
    }

    function clearHistory() {
        historyList = [];
        localStorage.setItem('yt_history', JSON.stringify(historyList));
        renderList(historyList);
    }

    async function loadMyPlaylists() {
        if (!gapi.client.getToken()) {
            document.getElementById('content-list').innerHTML = '<div style="padding:20px; text-align:center;">Please click "Connect YT" to view your playlists.</div>';
            return;
        }
        try {
            const res = await gapi.client.youtube.playlists.list({ mine: true, part: 'snippet,contentDetails', maxResults: 50 });
            renderList(res.result.items, true);
        } catch (e) { console.error(e); }
    }

    function handleSearch(e) { if (e.key === 'Enter') performSearch(e.target.value); }

    async function performSearch(query) {
        let params = { 
            q: query || (currentCategory === 'music' ? 'top hits' : 'trending'), 
            part: 'snippet', 
            type: 'video', 
            maxResults: 25 
        };
        if (currentCategory === 'music') params.videoCategoryId = '10'; 

        try {
            const res = await gapi.client.youtube.search.list(params);
            activeList = res.result.items;
            renderList(activeList);
        } catch (e) { console.error("Search Error", e); }
    }

    function toggleFavorite(item, event) {
        event.stopPropagation();
        const itemId = item.id.videoId || item.id || item.contentDetails?.videoId;
        const exists = favorites.find(f => (f.id.videoId || f.id || f.contentDetails?.videoId) === itemId);
        
        if (exists) {
            favorites = favorites.filter(f => (f.id.videoId || f.id || f.contentDetails?.videoId) !== itemId);
        } else {
            favorites.unshift(item);
        }
        
        localStorage.setItem('yt_favorites', JSON.stringify(favorites));
        
        if (currentCategory === 'favs') {
            renderList(favorites);
        } else {
            const btn = event.currentTarget;
            btn.classList.toggle('is-fav');
            btn.innerText = btn.classList.contains('is-fav') ? '❤️' : '♡';
        }
    }

    async function fetchStatsForItems(items) {
        const ids = items.map(item => item.id.videoId || item.id || item.contentDetails?.videoId).filter(id => id).join(',');
        if (!ids) return {};
        try {
            const res = await gapi.client.youtube.videos.list({
                part: 'statistics',
                id: ids
            });
            const statsMap = {};
            res.result.items.forEach(v => {
                statsMap[v.id] = v.statistics;
            });
            return statsMap;
        } catch (e) {
            console.error("Stats Fetch Error", e);
            return {};
        }
    }

    async function renderList(items, isPlaylist = false) {
        const container = document.getElementById('content-list');
        container.innerHTML = '';
        container.scrollTop = 0;
        
        if (!items || items.length === 0) {
            container.innerHTML = `<div style="padding:40px; opacity:0.5; text-align:center;">${currentCategory === 'history' ? 'History is empty' : 'No items found'}</div>`;
            return;
        }

        let statsMap = {};
        if (!isPlaylist) {
            statsMap = await fetchStatsForItems(items);
        }

        items.forEach((item) => {
            const card = document.createElement('div');
            card.className = 'item-card';
            const s = item.snippet;
            const vid = item.id.videoId || item.id || item.contentDetails?.videoId;
            const isFav = favorites.some(f => (f.id.videoId || f.id || f.contentDetails?.videoId) === vid);
            
            const stats = statsMap[vid] || {};
            const viewCount = formatNumber(stats.viewCount);
            const likeCount = formatNumber(stats.likeCount);

            card.onclick = () => { 
                if (isPlaylist) loadPlaylistVideos(item.id); 
                else {
                    playItem(vid);
                    addToHistory(item);
                }
            };
            
            card.innerHTML = `
                <img src="${s.thumbnails.medium.url}">
                <div class="item-details">
                    <div class="title-wrapper">
                        <div class="item-title">${s.title}</div>
                    </div>
                    <div class="item-meta">
                        <span>${isPlaylist ? 'Playlist' : s.channelTitle}</span>
                        ${!isPlaylist && viewCount !== '0' ? `
                            <span class="stats-badge">👁️ ${viewCount}</span>
                            <span class="stats-badge">👍 ${likeCount}</span>
                        ` : ''}
                    </div>
                </div>
                ${!isPlaylist ? `<button class="heart-btn ${isFav ? 'is-fav' : ''}" onclick="toggleFavorite(${JSON.stringify(item).replace(/"/g, '&quot;')}, event)">${isFav ? '❤️' : '♡'}</button>` : ''}
            `;
            container.appendChild(card);

            // Handle the double-text for seamless marquee loop
            const titleEl = card.querySelector('.item-title');
            const wrapperEl = card.querySelector('.title-wrapper');
            if (titleEl.offsetWidth > wrapperEl.offsetWidth) {
                titleEl.innerHTML += '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;' + titleEl.innerHTML;
            } else {
                // If text fits, don't animate
                titleEl.style.animation = 'none';
            }
        });
    }

    async function loadPlaylistVideos(playlistId) {
        try {
            const res = await gapi.client.youtube.playlistItems.list({ playlistId: playlistId, part: 'snippet,contentDetails', maxResults: 50 });
            activeList = res.result.items;
            renderList(activeList);
        } catch (e) { console.error(e); }
    }

    function shuffleCurrentList() {
        if (activeList.length === 0) return;
        let shuffled = [...activeList];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        activeList = shuffled;
        renderList(activeList);
        const firstVid = activeList[0].id.videoId || activeList[0].id || activeList[0].contentDetails?.videoId;
        playItem(firstVid);
    }

    function playItem(id) { if (player?.loadVideoById) player.loadVideoById(id); }

    function addToHistory(item) {
        const id = item.id.videoId || item.id;
        historyList = [item, ...historyList.filter(i => (i.id.videoId || i.id) !== id)].slice(0, 50);
        localStorage.setItem('yt_history', JSON.stringify(historyList));
    }

    var tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
    document.getElementsByTagName('script')[0].parentNode.insertBefore(tag, null);
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', { height: '100%', width: '100%', playerVars: { 'playsinline': 1, 'autoplay': 1 } });
    }
</script>
</body>
</html>
