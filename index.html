<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Media Tool</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --sidebar-color: #121212;
            --accent-color: #ff0000;
            --text-color: #ffffff;
            --secondary-text: #b3b3b3;
            --item-hover: #282828;
            --card-bg: #181818;
            --player-bg: #000000;
            --border-color: rgba(255, 255, 255, 0.1);
            --input-bg: #2a2a2a;
        }

        .music-accent {
            --accent-color: #1db954;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background 0.3s ease;
        }

        #sidebar {
            width: 400px;
            background-color: var(--sidebar-color);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            z-index: 10;
            height: 100%;
            position: relative;
        }

        #display-area { 
            flex: 1; 
            position: relative; 
            background: var(--player-bg);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header {
            padding: 12px 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        #auth-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 11px;
            white-space: nowrap;
            transition: opacity 0.2s;
        }
        
        #auth-btn.connected {
            background-color: #282828;
            color: #1db954;
            cursor: default;
        }

        .playback-controls-inline {
            display: flex;
            gap: 12px;
            align-items: center;
            background: rgba(255,255,255,0.05);
            padding: 4px 10px;
            border-radius: 20px;
        }

        .tabs-container {
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
            flex-shrink: 0;
        }
        .tabs-container::-webkit-scrollbar { display: none; }

        .tabs {
            display: flex;
            background: rgba(255,255,255,0.05);
            padding: 4px;
            border-radius: 8px;
            gap: 2px;
            width: max-content;
            min-width: 100%;
        }

        .tab {
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--secondary-text);
        }

        .tab.active { background: var(--accent-color); color: white; }

        .action-bar { padding: 12px 15px; flex-shrink: 0; display: flex; gap: 10px; align-items: center; border-bottom: 1px solid var(--border-color); }

        #search-input {
            flex: 1;
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background: var(--input-bg);
            color: var(--text-color);
            outline: none;
            font-size: 13px;
        }

        .control-btn {
            background: none;
            border: none;
            color: var(--secondary-text);
            cursor: pointer;
            font-size: 16px;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2px;
        }

        .control-btn.active {
            color: var(--accent-color);
        }

        #clear-history-btn {
            background: var(--input-bg);
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            display: none;
            color: var(--text-color);
        }

        #content-list {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .item-card {
            display: flex;
            gap: 12px;
            padding: 8px;
            background: var(--card-bg);
            border-radius: 10px;
            cursor: pointer;
            align-items: center;
            position: relative;
        }
        .item-card:hover { background: var(--item-hover); }

        .thumb-container {
            position: relative;
            width: 90px;
            height: 50px;
            flex-shrink: 0;
        }

        .item-card img {
            width: 100%;
            height: 100%;
            border-radius: 6px;
            object-fit: cover;
        }

        .duration-badge {
            position: absolute;
            bottom: 3px;
            right: 3px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 1px 3px;
            border-radius: 3px;
            font-size: 9px;
            font-weight: bold;
        }

        .item-details { 
            flex-grow: 1; 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        .item-title { 
            font-size: 12px; 
            font-weight: 600; 
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-color);
        }

        .item-meta { 
            font-size: 10px; 
            color: var(--secondary-text); 
            margin-top: 2px; 
            display: flex; 
            align-items: center; 
            gap: 6px;
            white-space: nowrap;
            width: 100%;
            overflow: hidden;
        }

        .channel-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex-shrink: 1;
            min-width: 0;
        }
        
        #video-container { width: 100%; height: 100%; background: #000; }

        #jump-to-top {
            position: absolute;
            bottom: 20px; 
            right: 20px;
            width: 40px;
            height: 40px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            cursor: pointer;
        }

        @media (max-width: 900px) {
            body { flex-direction: column; }
            #display-area { width: 100%; height: 35vh; }
            #sidebar { width: 100%; flex: 1; }
        }

        #modal-settings {
            display:none; 
            position:fixed; 
            top:0; left:0; 
            width:100%; height:100%; 
            background:rgba(0,0,0,0.9); 
            z-index:2000; 
            align-items:center; 
            justify-content:center;
        }
        .modal-content {
            background: #1e1e1e; 
            color: white; 
            padding: 20px; 
            border-radius: 10px; 
            width: 320px;
            border: 1px solid #333;
        }
        .modal-content input {
            width: 100%; 
            margin-bottom: 10px; 
            padding: 10px; 
            box-sizing: border-box; 
            border: 1px solid #444; 
            border-radius: 4px;
            background: #2a2a2a;
            color: white;
        }
    </style>
</head>
<body class="music-accent">

<div id="display-area">
    <div id="video-container">
        <div id="player"></div>
    </div>
</div>

<div id="sidebar">
    <div class="header">
        <div class="top-row">
            <button id="auth-btn" onclick="handleAuthClick()">Connect YT</button>
            
            <div class="playback-controls-inline">
                <button id="btn-shuffle" class="control-btn" onclick="toggleShuffle()" title="Shuffle">🔀</button>
                <button class="control-btn" onclick="playPrev()" title="Previous">⏮️</button>
                <button class="control-btn" onclick="playNext()" title="Next">⏭️</button>
                <!-- Loop button removed per request -->
            </div>

            <button onclick="showSettings()" style="background:none; border:none; cursor:pointer; font-size:16px; filter: invert(1); padding:0;">⚙️</button>
        </div>
        <div class="tabs-container">
            <div class="tabs">
                <div id="tab-music" class="tab active" onclick="setCategory('music')">Music</div>
                <div id="tab-video" class="tab" onclick="setCategory('video')">Video</div>
                <div id="tab-my-playlists" class="tab" onclick="setCategory('my-playlists')">Playlists</div>
                <div id="tab-favs" class="tab" onclick="setCategory('favs')">Favs</div>
                <div id="tab-history" class="tab" onclick="setCategory('history')">History</div>
            </div>
        </div>
    </div>

    <div class="action-bar">
        <input type="text" id="search-input" placeholder="Search music..." onkeypress="handleSearch(event)">
        <button id="clear-history-btn" onclick="clearHistory()">Clear All</button>
    </div>
    
    <div id="content-list" onscroll="handleSidebarScroll()"></div>
    <button id="jump-to-top" onclick="scrollToTop()">↑</button>
</div>

<div id="modal-settings">
    <div class="modal-content">
        <h3 style="margin-top:0;">Settings</h3>
        <label style="font-size: 12px; color: #aaa;">Client ID</label>
        <input type="text" id="input-client-id" placeholder="Client ID">
        <label style="font-size: 12px; color: #aaa;">API Key</label>
        <input type="password" id="input-api-key" placeholder="API Key">
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button onclick="saveSettings()" style="flex: 1; padding:10px; background:var(--accent-color); color:white; border:none; border-radius:5px; cursor: pointer; font-weight: bold;">Save</button>
            <button onclick="hideSettings()" style="flex: 1; padding:10px; background:#444; color:white; border:none; border-radius:5px; cursor: pointer;">Cancel</button>
        </div>
    </div>
</div>

<script>
    let CLIENT_ID = localStorage.getItem('yt_client_id') || '';
    let API_KEY = localStorage.getItem('yt_api_key') || '';
    let tokenClient, player, currentCategory = 'music';
    let historyList = JSON.parse(localStorage.getItem('yt_history') || '[]');
    let favorites = JSON.parse(localStorage.getItem('yt_favorites') || '[]');
    let currentList = [];
    let currentPlayingIndex = -1;
    let isShuffle = false;
    let nextPageToken = null;
    let isFetching = false;
    let currentPlaylistId = null; 

    window.onload = function() {
        document.getElementById('input-client-id').value = CLIENT_ID;
        document.getElementById('input-api-key').value = API_KEY;
        if (!CLIENT_ID || !API_KEY) showSettings();
        else initGapi();
    };

    function initGapi() {
        gapi.load('client', async () => {
            try {
                await gapi.client.init({ apiKey: API_KEY, discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/youtube/v3/rest"] });
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID, 
                    scope: "https://www.googleapis.com/auth/youtube.readonly", 
                    callback: (resp) => {
                        if (resp.access_token) {
                            updateAuthButton(true);
                            setCategory('my-playlists');
                        }
                    }
                });
                // Check if already authenticated (simple check)
                if (gapi.client.getToken()) updateAuthButton(true);
                
                performSearch('', false);
            } catch(e) { console.error("Init Error", e); }
        });
    }

    function updateAuthButton(connected) {
        const btn = document.getElementById('auth-btn');
        if (connected) {
            btn.innerText = "Connected";
            btn.classList.add('connected');
            btn.onclick = null;
        } else {
            btn.innerText = "Connect YT";
            btn.classList.remove('connected');
            btn.onclick = handleAuthClick;
        }
    }

    function setCategory(cat) {
        currentCategory = cat;
        nextPageToken = null;
        currentPlaylistId = null; 
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(`tab-${cat}`).classList.add('active');
        if (cat === 'music') document.body.classList.add('music-accent');
        else document.body.classList.remove('music-accent');
        
        const searchInput = document.getElementById('search-input');
        const clearBtn = document.getElementById('clear-history-btn');

        if (cat === 'music' || cat === 'video') {
            searchInput.style.display = 'block';
            clearBtn.style.display = 'none';
            searchInput.placeholder = (cat === 'music') ? "Search music..." : "Search videos...";
            performSearch('', false);
        } else {
            searchInput.style.display = 'none';
            clearBtn.style.display = (cat === 'history') ? 'block' : 'none';
            if (cat === 'history') renderList(historyList);
            else if (cat === 'favs') renderList(favorites);
            else if (cat === 'my-playlists') loadMyPlaylists();
        }
    }

    async function performSearch(query, isAppend = false) {
        if (isFetching || !API_KEY) return;
        isFetching = true;
        const isMusic = (currentCategory === 'music');
        let params = {
            part: 'snippet',
            type: 'video',
            maxResults: 25,
            q: query || (isMusic ? "top music hits" : "trending"),
            pageToken: nextPageToken || ''
        };
        if (isMusic) params.videoCategoryId = '10';

        try {
            const res = await gapi.client.youtube.search.list(params);
            nextPageToken = res.result.nextPageToken;
            renderList(res.result.items, false, isAppend);
        } catch (e) { console.error(e); }
        finally { isFetching = false; }
    }

    async function loadMyPlaylists() {
        if (!gapi.client.getToken()) {
            document.getElementById('content-list').innerHTML = '<div style="padding:20px; text-align:center; color: var(--secondary-text);">Connect YouTube to view your playlists.</div>';
            return;
        }
        try {
            const res = await gapi.client.youtube.playlists.list({ mine: true, part: 'snippet,contentDetails', maxResults: 50 });
            renderList(res.result.items, true, false);
        } catch (e) { console.error(e); }
    }

    async function loadPlaylistVideos(playlistId, isAppend = false) {
        try {
            const res = await gapi.client.youtube.playlistItems.list({ 
                playlistId: playlistId, 
                part: 'snippet,contentDetails', 
                maxResults: 25,
                pageToken: nextPageToken || ''
            });
            nextPageToken = res.result.nextPageToken;
            renderList(res.result.items, false, isAppend);
        } catch (e) { console.error(e); }
    }

    function parseDuration(duration) {
        if(!duration) return '';
        const match = duration.match(/PT(\d+H)?(\d+M)?(\d+S)?/);
        const hours = (parseInt(match[1]) || 0);
        const minutes = (parseInt(match[2]) || 0);
        const seconds = (parseInt(match[3]) || 0);
        if (hours > 0) {
            return `${hours}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
        return `${minutes}:${seconds.toString().padStart(2, '0')}`;
    }

    async function renderList(items, isFolder = false, isAppend = false) {
        const container = document.getElementById('content-list');
        if (!isAppend) {
            container.innerHTML = '';
            currentList = items;
        } else {
            currentList = [...currentList, ...items];
        }

        if (!items || items.length === 0) {
            if (!isAppend) container.innerHTML = '<div style="padding:20px; text-align:center; opacity:0.5;">No content found.</div>';
            return;
        }

        let detailMap = {};
        if (!isFolder && currentCategory !== 'my-playlists') {
            const ids = items.map(i => i.id.videoId || i.id || i.contentDetails?.videoId).filter(id => id).join(',');
            if (ids) {
                const res = await gapi.client.youtube.videos.list({ part: 'statistics,contentDetails', id: ids });
                if(res.result.items) res.result.items.forEach(v => { detailMap[v.id] = v; });
            }
        }

        items.forEach((item, index) => {
            const s = item.snippet;
            const vid = item.id.videoId || item.id || item.contentDetails?.videoId;
            const card = document.createElement('div');
            card.className = 'item-card';
            
            const details = detailMap[vid] || {};
            const stats = details.statistics || {};
            const content = details.contentDetails || {};
            
            const views = stats.viewCount ? formatNum(stats.viewCount) : '';
            const duration = content.duration ? parseDuration(content.duration) : '';

            card.onclick = () => {
                if (isFolder && currentCategory === 'my-playlists') {
                    currentPlaylistId = item.id;
                    nextPageToken = null;
                    loadPlaylistVideos(item.id, false);
                } else {
                    currentPlayingIndex = isAppend ? (currentList.length - items.length + index) : index;
                    playItem(vid);
                    addToHistory(item);
                }
            };

            card.innerHTML = `
                <div class="thumb-container">
                    <img src="${s.thumbnails.medium.url}">
                    ${duration ? `<div class="duration-badge">${duration}</div>` : ''}
                </div>
                <div class="item-details">
                    <div class="item-title">${s.title}</div>
                    <div class="item-meta">
                        <span class="channel-name">${isFolder ? 'Playlist' : s.channelTitle}</span>
                        ${views ? `<span style="display:flex;align-items:center;gap:2px;">👁️ ${views}</span>` : ''}
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function toggleShuffle() {
        isShuffle = !isShuffle;
        document.getElementById('btn-shuffle').classList.toggle('active', isShuffle);
    }

    function playNext() {
        if (currentList.length === 0) return;
        let nextIndex;
        if (isShuffle) {
            nextIndex = Math.floor(Math.random() * currentList.length);
        } else {
            nextIndex = currentPlayingIndex + 1;
            if (nextIndex >= currentList.length) {
                nextIndex = 0; // Wrap to start
            }
        }
        
        const item = currentList[nextIndex];
        // Handle various ID formats from search vs playlist results
        const vid = item.id?.videoId || item.id || item.contentDetails?.videoId;
        
        if (vid) {
            currentPlayingIndex = nextIndex;
            playItem(vid);
        }
    }

    function playPrev() {
        if (currentList.length === 0) return;
        let prevIndex = currentPlayingIndex - 1;
        if (prevIndex < 0) {
            prevIndex = currentList.length - 1;
        }
        
        const item = currentList[prevIndex];
        const vid = item.id?.videoId || item.id || item.contentDetails?.videoId;
        
        if (vid) {
            currentPlayingIndex = prevIndex;
            playItem(vid);
        }
    }

    function clearHistory() {
        historyList = [];
        localStorage.removeItem('yt_history');
        renderList([]);
    }

    function formatNum(n) {
        n = parseInt(n);
        if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
        if (n >= 1000) return (n/1000).toFixed(1) + 'K';
        return n;
    }

    function handleSearch(e) { if (e.key === 'Enter') performSearch(e.target.value, false); }
    
    function playItem(id) { 
        if (player && player.loadVideoById) {
            player.loadVideoById(id);
        }
    }

    function addToHistory(item) {
        const vid = item.id?.videoId || item.id || item.contentDetails?.videoId;
        historyList = [item, ...historyList.filter(i => {
            const currentId = i.id?.videoId || i.id || i.contentDetails?.videoId;
            return currentId !== vid;
        })].slice(0, 50);
        localStorage.setItem('yt_history', JSON.stringify(historyList));
    }

    function showSettings() { document.getElementById('modal-settings').style.display = 'flex'; }
    function hideSettings() { document.getElementById('modal-settings').style.display = 'none'; }
    function saveSettings() {
        localStorage.setItem('yt_client_id', document.getElementById('input-client-id').value);
        localStorage.setItem('yt_api_key', document.getElementById('input-api-key').value);
        location.reload();
    }

    function handleAuthClick() {
        tokenClient.requestAccessToken({prompt: 'consent'});
    }

    function handleSidebarScroll() {
        const btn = document.getElementById('jump-to-top');
        btn.style.display = document.getElementById('content-list').scrollTop > 300 ? 'flex' : 'none';
    }
    
    function scrollToTop() { document.getElementById('content-list').scrollTo({top:0, behavior:'smooth'}); }

    var tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
    document.getElementsByTagName('script')[0].parentNode.insertBefore(tag, null);
    
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', { 
            height: '100%', 
            width: '100%', 
            playerVars: { 'autoplay': 1, 'playsinline': 1 },
            events: {
                'onStateChange': (event) => {
                    if (event.data === YT.PlayerState.ENDED) playNext();
                }
            }
        });
    }
</script>
</body>
</html>
