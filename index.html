<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Media Tool - Personalized Edition</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --sidebar-color: #1e293b;
            --accent-color: #ff0000;
            --text-color: #f8fafc;
            --secondary-text: #94a3b8;
            --item-hover: #334155;
            --card-bg: rgba(255, 255, 255, 0.05);
            --player-bg: #000000;
            --heart-color: #ff4757;
            --border-color: rgba(255, 255, 255, 0.1);
            --scrollbar-thumb: #475569;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        #sidebar {
            width: 400px;
            height: 100vh;
            background-color: var(--sidebar-color);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            flex-shrink: 0;
            position: relative;
        }

        #display-area { 
            flex: 1; 
            background: var(--player-bg);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header {
            padding: 20px;
            flex-shrink: 0;
            border-bottom: 1px solid var(--border-color);
        }

        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        #user-info {
            display: none;
            align-items: center;
            gap: 10px;
        }

        #user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--accent-color);
        }

        #auth-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
        }

        .btn-group { display: flex; gap: 8px; }

        .icon-btn {
            font-size: 18px;
            cursor: pointer;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 6px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tabs {
            display: flex;
            background: rgba(0,0,0,0.2);
            padding: 4px;
            border-radius: 10px;
            gap: 2px;
            overflow-x: auto;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 8px 2px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--secondary-text);
            white-space: nowrap;
        }

        .tab.active { background: var(--accent-color); color: white; }

        .search-box { 
            padding: 15px 20px; 
            flex-shrink: 0;
            background: rgba(0,0,0,0.1);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #search-input {
            flex: 1;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-color);
            box-sizing: border-box;
            outline: none;
        }

        #viewport {
            flex: 1;
            overflow-y: auto;
            position: relative;
            scrollbar-width: thin;
            scrollbar-color: var(--scrollbar-thumb) transparent;
        }

        #viewport::-webkit-scrollbar { width: 8px; }
        #viewport::-webkit-scrollbar-thumb {
            background-color: var(--scrollbar-thumb);
            border-radius: 20px;
        }

        #scroll-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
        }

        #visible-items {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .item-card {
            position: absolute;
            left: 20px;
            right: 20px;
            height: 100px;
            display: flex;
            gap: 12px;
            padding: 8px;
            background: var(--card-bg);
            border-radius: 8px;
            cursor: pointer;
            align-items: center;
            border: 1px solid transparent;
            transition: background 0.2s;
        }
        .item-card:hover { 
            background: var(--item-hover);
            border-color: var(--border-color);
        }

        .thumb-container {
            position: relative;
            width: 120px;
            height: 68px;
            flex-shrink: 0;
        }

        .item-card img {
            width: 100%;
            height: 100%;
            border-radius: 4px;
            object-fit: cover;
        }

        .duration-badge {
            position: absolute;
            bottom: 4px;
            right: 4px;
            background: rgba(0,0,0,0.8);
            color: white;
            font-size: 10px;
            padding: 2px 4px;
            border-radius: 2px;
            font-weight: bold;
        }

        .item-details { flex: 1; min-width: 0; }
        .item-title { 
            font-size: 13px; 
            font-weight: 500; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }
        .item-channel { font-size: 11px; color: var(--secondary-text); margin-bottom: 4px; }
        
        .item-stats {
            display: flex;
            gap: 12px;
            font-size: 10px;
            color: var(--secondary-text);
            margin-top: 2px;
        }
        .stat-item { display: flex; align-items: center; gap: 4px; }

        .fav-btn {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            color: var(--secondary-text);
        }
        .fav-btn.active { color: var(--heart-color); }

        #video-container { width: 100%; height: 100%; }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--sidebar-color);
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            border: 1px solid var(--border-color);
        }

        @media (max-width: 900px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: 60vh; }
            #display-area { height: 40vh; flex: none; }
        }
    </style>
</head>
<body>

<div id="display-area">
    <div id="video-container">
        <div id="player"></div>
    </div>
</div>

<div id="sidebar">
    <div class="header">
        <div class="top-row">
            <button id="auth-btn" onclick="handleAuthClick()">Connect YouTube</button>
            <div id="user-info">
                <img id="user-avatar" src="" alt="">
                <span id="user-name" style="font-size: 12px; font-weight: bold;"></span>
            </div>
            <div class="btn-group">
                <button class="icon-btn" onclick="shuffleCurrentList()" title="Shuffle">🔀</button>
                <button class="icon-btn" onclick="showSettings()" title="Settings">⚙️</button>
            </div>
        </div>
        <div class="tabs">
            <div id="tab-home" class="tab active" onclick="setCategory('home')">Home</div>
            <div id="tab-music" class="tab" onclick="setCategory('music')">Music</div>
            <div id="tab-playlists" class="tab" onclick="setCategory('playlists')">Lists</div>
            <div id="tab-favs" class="tab" onclick="setCategory('favs')">Favs</div>
            <div id="tab-history" class="tab" onclick="setCategory('history')">History</div>
        </div>
    </div>
    <div class="search-box">
        <input type="text" id="search-input" placeholder="Search YouTube..." onkeypress="handleSearch(event)">
    </div>
    
    <div id="viewport">
        <div id="scroll-content"></div>
        <div id="visible-items"></div>
    </div>
</div>

<div id="modal-settings" class="modal-overlay">
    <div class="modal-content">
        <h3>API Setup</h3>
        <p style="font-size: 11px; color: var(--secondary-text); margin-bottom: 10px;">Requires 'YouTube Data API v3' enabled in Google Cloud Console.</p>
        <input type="text" id="input-client-id" placeholder="Client ID" style="width:100%; margin-bottom:10px; padding:10px; background:#000; color:#fff; border:1px solid #444;">
        <input type="password" id="input-api-key" placeholder="API Key" style="width:100%; margin-bottom:15px; padding:10px; background:#000; color:#fff; border:1px solid #444;">
        <button onclick="saveSettings()" style="width:100%; padding:10px; background:var(--accent-color); color:white; border:none; cursor:pointer; font-weight:bold;">Save & Reload</button>
    </div>
</div>

<script>
    let CLIENT_ID = localStorage.getItem('yt_client_id') || '';
    let API_KEY = localStorage.getItem('yt_api_key') || '';
    let tokenClient, player, currentCategory = 'home';
    
    let activeList = [];
    let nextPageToken = '';
    let isFetching = false;
    let currentSearchQuery = '';

    const ITEM_HEIGHT = 110; 
    const BUFFER_COUNT = 5;

    let historyList = JSON.parse(localStorage.getItem('yt_history') || '[]');
    let favorites = JSON.parse(localStorage.getItem('yt_favorites') || '[]');

    window.onload = function() {
        if (!CLIENT_ID || !API_KEY) showSettings();
        else {
            initGapi();
            setupVirtualScroll();
        }
    };

    function initGapi() {
        gapi.load('client', async () => {
            try {
                await gapi.client.init({ 
                    apiKey: API_KEY, 
                    discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/youtube/v3/rest"] 
                });
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID, 
                    scope: "https://www.googleapis.com/auth/youtube.readonly", 
                    callback: handleAuthResponse
                });
            } catch(e) { console.error("GAPI Init Error", e); }
        });
    }

    async function handleAuthResponse(resp) {
        if (resp.error) return;
        document.getElementById('auth-btn').style.display = 'none';
        document.getElementById('user-info').style.display = 'flex';
        try {
            const channelRes = await gapi.client.youtube.channels.list({ part: 'snippet', mine: true });
            if (channelRes.result.items.length) {
                const user = channelRes.result.items[0].snippet;
                document.getElementById('user-avatar').src = user.thumbnails.default.url;
                document.getElementById('user-name').innerText = user.title;
            }
            setCategory('home');
        } catch(e) { console.error("Profile Fetch Error", e); }
    }

    function setupVirtualScroll() {
        const viewport = document.getElementById('viewport');
        viewport.addEventListener('scroll', () => {
            renderVirtualItems();
            const scrollBottom = viewport.scrollHeight - viewport.scrollTop - viewport.clientHeight;
            if (scrollBottom < 300 && !isFetching && nextPageToken) {
                if (['home', 'playlists', 'music'].includes(currentCategory)) fetchPersonalizedData(true);
                else if (currentSearchQuery) performSearch(currentSearchQuery, true);
            }
        });
    }

    function renderVirtualItems() {
        const viewport = document.getElementById('viewport');
        const visibleContainer = document.getElementById('visible-items');
        const scrollContent = document.getElementById('scroll-content');
        scrollContent.style.height = `${activeList.length * ITEM_HEIGHT}px`;

        const scrollTop = viewport.scrollTop;
        const viewportHeight = viewport.clientHeight;
        const startIndex = Math.max(0, Math.floor(scrollTop / ITEM_HEIGHT) - BUFFER_COUNT);
        const endIndex = Math.min(activeList.length - 1, Math.ceil((scrollTop + viewportHeight) / ITEM_HEIGHT) + BUFFER_COUNT);

        visibleContainer.innerHTML = '';
        for (let i = startIndex; i <= endIndex; i++) {
            const item = activeList[i];
            const vid = item.id?.videoId || item.snippet?.resourceId?.videoId || item.id;
            if (!vid || typeof vid !== 'string') continue;

            const isFav = favorites.some(f => (f.id?.videoId || f.snippet?.resourceId?.videoId || f.id) === vid);
            const stats = item.extraStats || { duration: '--:--', likes: '0', views: '0' };

            const card = document.createElement('div');
            card.className = 'item-card';
            card.style.transform = `translateY(${i * ITEM_HEIGHT}px)`;
            card.onclick = () => playItem(vid, item);
            
            card.innerHTML = `
                <div class="thumb-container">
                    <img src="${item.snippet.thumbnails?.medium?.url || item.snippet.thumbnails?.default?.url}">
                    <div class="duration-badge">${stats.duration}</div>
                </div>
                <div class="item-details">
                    <div class="item-title" title="${item.snippet.title}">${item.snippet.title}</div>
                    <div class="item-channel">${item.snippet.channelTitle || 'YouTube'}</div>
                    <div class="item-stats">
                        <div class="stat-item">👍 ${formatCount(stats.likes)}</div>
                        <div class="stat-item">👁️ ${formatCount(stats.views)}</div>
                    </div>
                </div>
                <button class="fav-btn ${isFav ? 'active' : ''}" onclick="event.stopPropagation(); toggleFav('${vid}', ${JSON.stringify(item).replace(/"/g, '&quot;')})">
                    ${isFav ? '❤️' : '🤍'}
                </button>
            `;
            visibleContainer.appendChild(card);
        }
    }

    async function fetchPersonalizedData(append = false) {
        if (isFetching || !gapi.client.getToken()) return;
        isFetching = true;
        try {
            let res;
            if (currentCategory === 'home') {
                res = await gapi.client.youtube.activities.list({
                    part: 'snippet,contentDetails',
                    mine: true,
                    maxResults: 25,
                    pageToken: nextPageToken
                });
                let items = res.result.items.filter(it => it.contentDetails.upload || it.contentDetails.recommendation);
                await enrichWithStats(items, append, 'activity');
            } else if (currentCategory === 'music') {
                // Fetch music specifically by category 10 (Music)
                res = await gapi.client.youtube.search.list({
                    part: 'snippet',
                    type: 'video',
                    videoCategoryId: '10',
                    maxResults: 25,
                    pageToken: nextPageToken,
                    q: '' 
                });
                await enrichWithStats(res.result.items, append, 'search');
            } else if (currentCategory === 'playlists') {
                res = await gapi.client.youtube.playlists.list({
                    part: 'snippet,contentDetails',
                    mine: true,
                    maxResults: 25,
                    pageToken: nextPageToken
                });
                const items = res.result.items;
                if (append) activeList = activeList.concat(items);
                else activeList = items;
            }
            nextPageToken = res.result.nextPageToken || '';
            renderVirtualItems();
        } catch (e) { console.error("Fetch Error", e); }
        finally { isFetching = false; }
    }

    async function enrichWithStats(items, append, type) {
        const videoIds = items.map(it => {
            if (type === 'activity') return it.contentDetails.upload?.videoId || it.contentDetails.recommendation?.resourceId?.videoId;
            return it.id.videoId;
        }).filter(id => !!id).join(',');

        if (videoIds) {
            const statsRes = await gapi.client.youtube.videos.list({ part: 'contentDetails,statistics', id: videoIds });
            const statsMap = {};
            statsRes.result.items.forEach(v => {
                statsMap[v.id] = {
                    duration: formatDuration(v.contentDetails.duration),
                    likes: v.statistics.likeCount,
                    views: v.statistics.viewCount
                };
            });
            items.forEach(it => {
                const vid = type === 'activity' ? (it.contentDetails.upload?.videoId || it.contentDetails.recommendation?.resourceId?.videoId) : it.id.videoId;
                it.extraStats = statsMap[vid];
            });
        }
        if (append) activeList = activeList.concat(items);
        else activeList = items;
    }

    async function performSearch(query, append = false) {
        if (isFetching || !query) return;
        isFetching = true;
        try {
            const res = await gapi.client.youtube.search.list({
                q: query, part: 'snippet', type: 'video', maxResults: 25, pageToken: nextPageToken
            });
            let items = res.result.items;
            nextPageToken = res.result.nextPageToken || '';
            const ids = items.map(it => it.id.videoId).join(',');
            const statsRes = await gapi.client.youtube.videos.list({ part: 'contentDetails,statistics', id: ids });
            const statsMap = {};
            statsRes.result.items.forEach(v => statsMap[v.id] = {
                duration: formatDuration(v.contentDetails.duration),
                likes: v.statistics.likeCount,
                views: v.statistics.viewCount
            });
            items.forEach(it => it.extraStats = statsMap[it.id.videoId]);
            if (append) activeList = activeList.concat(items);
            else activeList = items;
            renderVirtualItems();
        } catch (e) { console.error(e); }
        finally { isFetching = false; }
    }

    function setCategory(cat) {
        currentCategory = cat;
        nextPageToken = '';
        activeList = [];
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(`tab-${cat}`).classList.add('active');
        if (cat === 'favs') { activeList = [...favorites]; renderVirtualItems(); }
        else if (cat === 'history') { activeList = [...historyList]; renderVirtualItems(); }
        else if (gapi.client.getToken()) fetchPersonalizedData();
        document.getElementById('viewport').scrollTop = 0;
    }

    function handleAuthClick() { tokenClient.requestAccessToken({prompt: gapi.client.getToken() ? '' : 'consent'}); }
    function handleSearch(e) { if (e.key === 'Enter') { currentSearchQuery = e.target.value; nextPageToken = ''; performSearch(currentSearchQuery); } }

    function formatDuration(duration) {
        if (!duration) return "0:00";
        const match = duration.match(/PT(\d+H)?(\d+M)?(\d+S)?/);
        const hours = (parseInt(match[1]) || 0);
        const minutes = (parseInt(match[2]) || 0);
        const seconds = (parseInt(match[3]) || 0);
        let result = "";
        if (hours > 0) result += hours + ":";
        result += (hours > 0 && minutes < 10 ? "0" + minutes : minutes) + ":";
        result += (seconds < 10 ? "0" + seconds : seconds);
        return result;
    }

    function formatCount(num) {
        if (!num) return "0";
        const n = parseInt(num);
        if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
        if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
        return n.toString();
    }

    function toggleFav(id, item) {
        const idx = favorites.findIndex(f => (f.id?.videoId || f.snippet?.resourceId?.videoId || f.id) === id);
        if (idx > -1) favorites.splice(idx, 1);
        else favorites.unshift(item);
        localStorage.setItem('yt_favorites', JSON.stringify(favorites));
        if (currentCategory === 'favs') activeList = [...favorites];
        renderVirtualItems();
    }

    function playItem(id, item) { 
        if (player?.loadVideoById) {
            player.loadVideoById(id);
            const exists = historyList.findIndex(h => (h.id?.videoId || h.snippet?.resourceId?.videoId || h.id) === id);
            if (exists > -1) historyList.splice(exists, 1);
            historyList.unshift(item);
            if (historyList.length > 200) historyList.pop();
            localStorage.setItem('yt_history', JSON.stringify(historyList));
        }
    }

    function shuffleCurrentList() { if (activeList.length < 2) return; activeList.sort(() => Math.random() - 0.5); renderVirtualItems(); }
    function showSettings() { 
        document.getElementById('input-client-id').value = CLIENT_ID;
        document.getElementById('input-api-key').value = API_KEY;
        document.getElementById('modal-settings').style.display = 'flex'; 
    }
    function saveSettings() {
        localStorage.setItem('yt_client_id', document.getElementById('input-client-id').value.trim());
        localStorage.setItem('yt_api_key', document.getElementById('input-api-key').value.trim());
        location.reload();
    }

    var tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
    document.getElementsByTagName('script')[0].parentNode.insertBefore(tag, null);
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', { height: '100%', width: '100%', playerVars: { 'autoplay': 1, 'origin': window.location.origin } });
    }
</script>
</body>
</html>
