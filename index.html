<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Media Tool</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --sidebar-color: #ffffff;
            --accent-color: #ff0000;
            --text-color: #1c1e21;
            --secondary-text: #606770;
            --item-hover: #f2f3f5;
            --card-bg: #ffffff;
            --player-bg: #000000;
        }

        .music-mode {
            --bg-color: #0a0a0a;
            --sidebar-color: #121212;
            --accent-color: #1db954;
            --text-color: #ffffff;
            --secondary-text: #b3b3b3;
            --item-hover: #282828;
            --card-bg: #181818;
            --player-bg: #000000;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background 0.3s ease;
        }

        #sidebar {
            width: 400px;
            background-color: var(--sidebar-color);
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(0,0,0,0.1);
            z-index: 10;
            height: 100%;
            position: relative;
        }

        #display-area { 
            flex: 1; 
            position: relative; 
            background: var(--player-bg);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            flex-shrink: 0;
        }

        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #auth-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
        }

        .tabs-container {
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
            flex-shrink: 0;
        }
        .tabs-container::-webkit-scrollbar { display: none; }

        .tabs {
            display: flex;
            background: rgba(0,0,0,0.05);
            padding: 4px;
            border-radius: 8px;
            gap: 2px;
            width: max-content;
            min-width: 100%;
        }

        .tab {
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--secondary-text);
        }

        .tab.active { background: var(--accent-color); color: white; }

        .action-bar { padding: 15px; flex-shrink: 0; display: flex; gap: 10px; align-items: center; }

        #search-input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 20px;
            border: 1px solid rgba(0,0,0,0.1);
            background: var(--bg-color);
            color: var(--text-color);
            outline: none;
        }

        #clear-history-btn {
            background: #eee;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            display: none;
            color: #666;
        }

        #content-list {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .item-card {
            display: flex;
            gap: 12px;
            padding: 10px;
            background: var(--card-bg);
            border-radius: 10px;
            cursor: pointer;
            align-items: center;
            position: relative;
        }
        .item-card:hover { background: var(--item-hover); }

        .item-card img {
            width: 100px;
            height: 56px;
            border-radius: 6px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .item-details { 
            flex-grow: 1; 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        .item-title { 
            font-size: 13px; 
            font-weight: 600; 
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-meta { 
            font-size: 11px; 
            color: var(--secondary-text); 
            margin-top: 4px; 
            display: flex; 
            align-items: center; 
            gap: 8px;
            white-space: nowrap;
            width: 100%;
            overflow: hidden;
        }

        .channel-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex-shrink: 1;
            min-width: 0;
        }
        
        .stats-badge {
            display: flex;
            align-items: center;
            gap: 3px;
            opacity: 0.8;
            flex-shrink: 0;
        }

        #video-container { width: 100%; height: 100%; background: #000; }

        #jump-to-top {
            position: absolute;
            bottom: 20px; 
            right: 20px;
            width: 40px;
            height: 40px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        @media (max-width: 900px) {
            body { flex-direction: column; }
            #display-area { width: 100%; height: 35vh; }
            #sidebar { width: 100%; flex: 1; }
        }
    </style>
</head>
<body class="music-mode">

<div id="display-area">
    <div id="video-container">
        <div id="player"></div>
    </div>
</div>

<div id="sidebar">
    <div class="header">
        <div class="top-row">
            <button id="auth-btn" onclick="handleAuthClick()">Connect YT</button>
            <button onclick="showSettings()" style="background:none; border:none; cursor:pointer; font-size:18px;">⚙️</button>
        </div>
        <div class="tabs-container">
            <div class="tabs">
                <div id="tab-music" class="tab active" onclick="setCategory('music')">Music</div>
                <div id="tab-video" class="tab" onclick="setCategory('video')">Video</div>
                <div id="tab-my-playlists" class="tab" onclick="setCategory('my-playlists')">Playlists</div>
                <div id="tab-favs" class="tab" onclick="setCategory('favs')">Favs</div>
                <div id="tab-history" class="tab" onclick="setCategory('history')">History</div>
            </div>
        </div>
    </div>
    <div class="action-bar">
        <input type="text" id="search-input" placeholder="Search music..." onkeypress="handleSearch(event)">
        <button id="clear-history-btn" onclick="clearHistory()">Clear All</button>
    </div>
    <div id="content-list" onscroll="handleSidebarScroll()"></div>
    <button id="jump-to-top" onclick="scrollToTop()">↑</button>
</div>

<div id="modal-settings" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; align-items:center; justify-content:center;">
    <div style="background:white; color:black; padding:20px; border-radius:10px; width:300px;">
        <h3 style="margin-top:0;">Settings</h3>
        <label style="font-size: 12px; color: #666;">Client ID</label>
        <input type="text" id="input-client-id" placeholder="Client ID" style="width:100%; margin-bottom:10px; padding:8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;">
        <label style="font-size: 12px; color: #666;">API Key</label>
        <input type="password" id="input-api-key" placeholder="API Key" style="width:100%; margin-bottom:20px; padding:8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;">
        <div style="display: flex; gap: 10px;">
            <button onclick="saveSettings()" style="flex: 1; padding:10px; background:red; color:white; border:none; border-radius:5px; cursor: pointer; font-weight: bold;">Save</button>
            <button onclick="hideSettings()" style="flex: 1; padding:10px; background:#ccc; color:black; border:none; border-radius:5px; cursor: pointer;">Cancel</button>
        </div>
    </div>
</div>

<script>
    let CLIENT_ID = localStorage.getItem('yt_client_id') || '';
    let API_KEY = localStorage.getItem('yt_api_key') || '';
    let tokenClient, player, currentCategory = 'music';
    let historyList = JSON.parse(localStorage.getItem('yt_history') || '[]');
    let favorites = JSON.parse(localStorage.getItem('yt_favorites') || '[]');
    let nextPageToken = null;
    let isFetching = false;
    let currentPlaylistId = null; 

    window.onload = function() {
        document.getElementById('input-client-id').value = CLIENT_ID;
        document.getElementById('input-api-key').value = API_KEY;
        
        if (!CLIENT_ID || !API_KEY) showSettings();
        else initGapi();
    };

    function initGapi() {
        gapi.load('client', async () => {
            try {
                await gapi.client.init({ apiKey: API_KEY, discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/youtube/v3/rest"] });
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID, scope: "https://www.googleapis.com/auth/youtube.readonly", callback: ''
                });
                performSearch('', false);
            } catch(e) { console.error("Init Error", e); }
        });
    }

    function setCategory(cat) {
        currentCategory = cat;
        nextPageToken = null;
        currentPlaylistId = null; 
        
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(`tab-${cat}`).classList.add('active');
        document.body.className = (cat === 'music') ? 'music-mode' : '';
        
        const searchInput = document.getElementById('search-input');
        const clearBtn = document.getElementById('clear-history-btn');

        // Toggle UI elements based on tab
        if (cat === 'music' || cat === 'video') {
            searchInput.style.display = 'block';
            clearBtn.style.display = 'none';
            searchInput.placeholder = (cat === 'music') ? "Search music..." : "Search videos...";
            performSearch('', false);
        } else {
            searchInput.style.display = 'none';
            clearBtn.style.display = (cat === 'history') ? 'block' : 'none';
            
            if (cat === 'history') renderList(historyList);
            else if (cat === 'favs') renderList(favorites);
            else if (cat === 'my-playlists') loadMyPlaylists();
        }
    }

    async function performSearch(query, isAppend = false) {
        if (isFetching || !API_KEY) return;
        isFetching = true;
        
        const isMusic = (currentCategory === 'music');
        let params = {
            part: 'snippet',
            type: 'video',
            maxResults: 25,
            q: query || (isMusic ? "top music hits" : "trending"),
            pageToken: nextPageToken || ''
        };
        if (isMusic) params.videoCategoryId = '10';

        try {
            const res = await gapi.client.youtube.search.list(params);
            nextPageToken = res.result.nextPageToken;
            renderList(res.result.items, false, isAppend);
        } catch (e) { console.error(e); }
        finally { isFetching = false; }
    }

    async function loadMyPlaylists() {
        if (!gapi.client.getToken()) {
            document.getElementById('content-list').innerHTML = '<div style="padding:20px; text-align:center;">Connect YouTube to view your playlists.</div>';
            return;
        }
        try {
            const res = await gapi.client.youtube.playlists.list({ mine: true, part: 'snippet,contentDetails', maxResults: 50 });
            renderList(res.result.items, true, false);
        } catch (e) { console.error(e); }
    }

    async function loadPlaylistVideos(playlistId, isAppend = false) {
        try {
            const res = await gapi.client.youtube.playlistItems.list({ 
                playlistId: playlistId, 
                part: 'snippet,contentDetails', 
                maxResults: 25,
                pageToken: nextPageToken || ''
            });
            nextPageToken = res.result.nextPageToken;
            renderList(res.result.items, false, isAppend);
        } catch (e) { console.error(e); }
    }

    async function renderList(items, isFolder = false, isAppend = false) {
        const container = document.getElementById('content-list');
        if (!isAppend) container.innerHTML = '';

        if (!items || items.length === 0) {
            container.innerHTML = '<div style="padding:20px; text-align:center; opacity:0.5;">No content found.</div>';
            return;
        }

        let statsMap = {};
        if (!isFolder && currentCategory !== 'my-playlists') {
            const ids = items.map(i => i.id.videoId || i.id || i.contentDetails?.videoId).filter(id => id).join(',');
            if (ids) {
                const res = await gapi.client.youtube.videos.list({ part: 'statistics', id: ids });
                res.result.items.forEach(v => { statsMap[v.id] = v.statistics; });
            }
        }

        items.forEach(item => {
            const s = item.snippet;
            const vid = item.id.videoId || item.id || item.contentDetails?.videoId;
            const card = document.createElement('div');
            card.className = 'item-card';
            
            const stats = statsMap[vid] || {};
            const views = stats.viewCount ? formatNum(stats.viewCount) : '';
            const likes = stats.likeCount ? formatNum(stats.likeCount) : '';

            card.onclick = () => {
                if (isFolder && currentCategory === 'my-playlists') {
                    currentPlaylistId = item.id;
                    nextPageToken = null;
                    loadPlaylistVideos(item.id, false);
                } else {
                    playItem(vid);
                    addToHistory(item);
                }
            };

            card.innerHTML = `
                <img src="${s.thumbnails.medium.url}">
                <div class="item-details">
                    <div class="item-title">${s.title}</div>
                    <div class="item-meta">
                        <span class="channel-name">${isFolder ? 'Playlist' : s.channelTitle}</span>
                        ${views ? `<span class="stats-badge">👁️ ${views}</span>` : ''}
                        ${likes ? `<span class="stats-badge">👍 ${likes}</span>` : ''}
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function clearHistory() {
        historyList = [];
        localStorage.removeItem('yt_history');
        renderList([]);
    }

    function formatNum(n) {
        n = parseInt(n);
        if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
        if (n >= 1000) return (n/1000).toFixed(1) + 'K';
        return n;
    }

    function handleSearch(e) { if (e.key === 'Enter') performSearch(e.target.value, false); }
    function playItem(id) { if (player?.loadVideoById) player.loadVideoById(id); }
    
    function addToHistory(item) {
        historyList = [item, ...historyList.filter(i => (i.id.videoId || i.id || i.contentDetails?.videoId) !== (item.id.videoId || item.id || item.contentDetails?.videoId))].slice(0, 50);
        localStorage.setItem('yt_history', JSON.stringify(historyList));
    }

    function showSettings() { document.getElementById('modal-settings').style.display = 'flex'; }
    function hideSettings() { document.getElementById('modal-settings').style.display = 'none'; }
    
    function saveSettings() {
        localStorage.setItem('yt_client_id', document.getElementById('input-client-id').value);
        localStorage.setItem('yt_api_key', document.getElementById('input-api-key').value);
        location.reload();
    }

    function handleAuthClick() {
        tokenClient.callback = (resp) => { if (!resp.error) setCategory('my-playlists'); };
        tokenClient.requestAccessToken({prompt: 'consent'});
    }

    function handleSidebarScroll() {
        const btn = document.getElementById('jump-to-top');
        btn.style.display = document.getElementById('content-list').scrollTop > 300 ? 'flex' : 'none';
    }
    function scrollToTop() { document.getElementById('content-list').scrollTo({top:0, behavior:'smooth'}); }

    var tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
    document.getElementsByTagName('script')[0].parentNode.insertBefore(tag, null);
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', { height: '100%', width: '100%', playerVars: { 'autoplay': 1, 'playsinline': 1 } });
    }
</script>
</body>
</html>
