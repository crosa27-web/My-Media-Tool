<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Media Tool</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --sidebar-color: #ffffff;
            --accent-color: #ff0000;
            --text-color: #1c1e21;
            --secondary-text: #606770;
            --item-hover: #f2f3f5;
            --card-bg: #ffffff;
            --player-bg: #000000;
        }

        .music-mode {
            --bg-color: #0a0a0a;
            --sidebar-color: #121212;
            --accent-color: #1db954;
            --text-color: #ffffff;
            --secondary-text: #b3b3b3;
            --item-hover: #282828;
            --card-bg: #181818;
            --player-bg: #000000;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background 0.3s ease;
        }

        #sidebar {
            width: 400px;
            background-color: var(--sidebar-color);
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(0,0,0,0.1);
            z-index: 10;
        }

        #display-area { 
            flex: 1; 
            position: relative; 
            background: var(--player-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #display-area.mini-player {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 300px;
            height: 168px;
            z-index: 100;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .header {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-group { display: flex; gap: 8px; align-items: center; }

        #auth-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }

        .icon-btn {
            font-size: 18px;
            cursor: pointer;
            opacity: 0.6;
            background: none;
            border: none;
            color: var(--text-color);
            padding: 5px;
        }
        .icon-btn:hover { opacity: 1; }

        .tabs {
            display: flex;
            background: rgba(0,0,0,0.05);
            padding: 4px;
            border-radius: 8px;
            gap: 2px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 6px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
        }

        .tab.active { background: var(--accent-color); color: white; }

        .search-box { padding: 15px; }

        #search-input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 20px;
            border: 1px solid rgba(0,0,0,0.1);
            background: var(--bg-color);
            color: var(--text-color);
            box-sizing: border-box;
            outline: none;
        }

        #content-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .item-card {
            display: flex;
            gap: 12px;
            padding: 10px;
            background: var(--card-bg);
            border-radius: 10px;
            cursor: pointer;
            align-items: center;
        }

        .item-card img {
            width: 100px;
            height: 56px;
            border-radius: 6px;
            object-fit: cover;
        }

        .item-title { font-size: 13px; font-weight: 600; }

        #video-container { width: 100%; height: 100%; }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--sidebar-color);
            color: var(--text-color);
            padding: 25px;
            border-radius: 12px;
            width: 90%;
            max-width: 350px;
        }

        @media (max-width: 900px) {
            body { flex-direction: column; }
            #display-area { 
                width: 100%; 
                height: 35vh; 
                flex: none;
                order: -1; 
            }
            #sidebar { width: 100%; flex: 1; }
            #display-area.mini-player {
                height: 100px;
                width: 180px;
            }
        }
    </style>
</head>
<body>

<div id="display-area">
    <div id="video-container">
        <div id="player"></div>
    </div>
</div>

<div id="sidebar">
    <div class="header">
        <div class="top-row">
            <button id="auth-btn" onclick="handleAuthClick()">Connect Account</button>
            <div class="btn-group">
                <button class="icon-btn" onclick="shuffleCurrentList()" title="Shuffle List">🔀</button>
                <button class="icon-btn" onclick="toggleMiniMode()" title="Toggle Mini Player">🔳</button>
                <button class="icon-btn" onclick="showSettings()">⚙️</button>
            </div>
        </div>
        <div class="tabs">
            <div id="tab-video" class="tab active" onclick="setCategory('video')">Video</div>
            <div id="tab-music" class="tab" onclick="setCategory('music')">Music</div>
            <div id="tab-favs" class="tab" onclick="setCategory('favs')">Favs</div>
            <div id="tab-history" class="tab" onclick="setCategory('history')">History</div>
        </div>
    </div>
    <div class="search-box">
        <input type="text" id="search-input" placeholder="Search..." onkeypress="handleSearch(event)">
    </div>
    <div id="content-list"></div>
</div>

<div id="modal-settings" class="modal-overlay">
    <div class="modal-content">
        <h3>App Credentials</h3>
        <input type="text" id="input-client-id" placeholder="Client ID" style="width:100%; margin-bottom:10px; padding:8px;">
        <input type="password" id="input-api-key" placeholder="API Key" style="width:100%; margin-bottom:10px; padding:8px;">
        <div style="display:flex; gap:10px;">
            <button onclick="closeModals()" style="flex:1; padding:10px;">Cancel</button>
            <button onclick="saveSettings()" style="flex:1; padding:10px; background:var(--accent-color); color:white; border:none;">Save</button>
        </div>
    </div>
</div>

<script>
    let CLIENT_ID = localStorage.getItem('yt_client_id') || '';
    let API_KEY = localStorage.getItem('yt_api_key') || '';
    let tokenClient, player, currentCategory = 'video';
    let activeList = [];
    let historyList = JSON.parse(localStorage.getItem('yt_history') || '[]');
    let favorites = JSON.parse(localStorage.getItem('yt_favorites') || '[]');

    window.onload = function() {
        if (!CLIENT_ID || !API_KEY) showSettings();
        else initGapi();
    };

    function initGapi() {
        gapi.load('client', async () => {
            try {
                await gapi.client.init({ apiKey: API_KEY, discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/youtube/v3/rest"] });
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID, scope: "https://www.googleapis.com/auth/youtube.readonly", callback: ''
                });
            } catch(e) {}
        });
    }

    function toggleMiniMode() { document.getElementById('display-area').classList.toggle('mini-player'); }
    function showSettings() { document.getElementById('modal-settings').style.display = 'flex'; }
    function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }
    
    function saveSettings() {
        localStorage.setItem('yt_client_id', document.getElementById('input-client-id').value);
        localStorage.setItem('yt_api_key', document.getElementById('input-api-key').value);
        location.reload();
    }

    function handleAuthClick() {
        tokenClient.callback = async (resp) => { if (!resp.error) { document.getElementById('auth-btn').innerText = "Connected"; loadInitial(); } };
        tokenClient.requestAccessToken({prompt: gapi.client.getToken() ? '' : 'consent'});
    }

    function setCategory(cat) {
        currentCategory = cat;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(`tab-${cat}`).classList.add('active');
        document.body.className = cat === 'music' ? 'music-mode' : '';
        if (cat === 'favs') renderList(favorites);
        else if (cat === 'history') renderList(historyList);
        else performSearch(document.getElementById('search-input').value || '');
    }

    async function loadInitial() {
        try {
            const res = await gapi.client.youtube.playlists.list({ mine: true, part: 'snippet', maxResults: 10 });
            renderList(res.result.items, true);
        } catch (e) {}
    }

    function handleSearch(e) { if (e.key === 'Enter') performSearch(e.target.value); }

    async function performSearch(query) {
        let params = { q: query || 'trending music', part: 'snippet', type: 'video', maxResults: 20 };
        if (currentCategory === 'music') params.videoCategoryId = '10';
        try {
            const res = await gapi.client.youtube.search.list(params);
            activeList = res.result.items;
            renderList(activeList);
        } catch (e) {}
    }

    function renderList(items, isPlaylist = false) {
        const container = document.getElementById('content-list');
        container.innerHTML = '';
        items.forEach((item) => {
            const card = document.createElement('div');
            card.className = 'item-card';
            const vid = item.id.videoId || item.id || item.contentDetails?.videoId;
            card.onclick = () => { if (isPlaylist) loadPlaylist(item.id); else playItem(vid); };
            card.innerHTML = `<img src="${item.snippet.thumbnails.medium.url}"><div class="item-details"><div class="item-title">${item.snippet.title}</div></div>`;
            container.appendChild(card);
        });
    }

    async function loadPlaylist(id) {
        const res = await gapi.client.youtube.playlistItems.list({ playlistId: id, part: 'snippet,contentDetails', maxResults: 50 });
        activeList = res.result.items;
        renderList(activeList);
    }

    function shuffleCurrentList() {
        if (activeList.length === 0) return;
        for (let i = activeList.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [activeList[i], activeList[j]] = [activeList[j], activeList[i]];
        }
        renderList(activeList);
        const firstVid = activeList[0].id.videoId || activeList[0].id || activeList[0].contentDetails?.videoId;
        playItem(firstVid);
    }

    function playItem(id) { if (player?.loadVideoById) player.loadVideoById(id); }

    var tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
    document.getElementsByTagName('script')[0].parentNode.insertBefore(tag, null);
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', { height: '100%', width: '100%', playerVars: { 'playsinline': 1, 'autoplay': 1 } });
    }
</script>
</body>
</html>
